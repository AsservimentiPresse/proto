<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>XR HANDS FIX</title>

<style>
body { margin: 0; overflow: hidden; background: black; }
</style>

</head>

<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.125/build/three.module.js";
import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.125/examples/jsm/webxr/VRButton.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// 🔥 LUCI (IMPORTANTISSIMO PER QUEST)
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(2, 5, 5);
scene.add(light);

// 🔷 OGGETTO TEST
const cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.3,0.3,0.3),
    new THREE.MeshStandardMaterial({ color: 0x00ff00 })
);
cube.position.set(0, 1.5, -1);
scene.add(cube);

// 🎮 CONTROLLER XR (MANI BASE)
const controller1 = renderer.xr.getController(0);
const controller2 = renderer.xr.getController(1);

scene.add(controller1);
scene.add(controller2);

// 👇 VISUALIZZAZIONE RAY
function buildRay(controller) {

    const geometry = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0,0,0),
        new THREE.Vector3(0,0,-1)
    ]);

    const line = new THREE.Line(
        geometry,
        new THREE.LineBasicMaterial({ color: 0xff0000 })
    );

    line.name = "ray";
    controller.add(line);
}

buildRay(controller1);
buildRay(controller2);

// 🎯 RAYCAST INTERACTION
const raycaster = new THREE.Raycaster();
let tempMatrix = new THREE.Matrix4();

controller1.addEventListener("selectstart", onSelect);
controller2.addEventListener("selectstart", onSelect);

function onSelect(event) {

    const controller = event.target;

    tempMatrix.identity().extractRotation(controller.matrixWorld);

    raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

    const intersects = raycaster.intersectObjects([cube]);

    if (intersects.length > 0) {
        cube.material.color.set(Math.random() * 0xffffff);
    }
}

// 🔁 LOOP
renderer.setAnimationLoop(() => {

    cube.rotation.y += 0.01;

    renderer.render(scene, camera);
});

</script>

</body>
</html>
